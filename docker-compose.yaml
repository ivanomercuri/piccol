version: "3.8"
services:
  server:
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    ports:
      - '8080:80'
    volumes:
      - ./src/api:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mysql

  php:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src/api:/var/www/html:delegated

  mysql:
    image: 'mysql:5.7'
    env_file:
      - ./env/mysql.env
    volumes:
      - ./database:/var/lib/mysql
    ports:
      - '3306:3306'

  composer:
    build:
      context: ./dockerfiles
      dockerfile: composer.dockerfile
    volumes:
      - ./src/api:/var/www/html

  artisan:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src/api:/var/www/html
    entrypoint: [ "php", "/var/www/html/artisan" ]

  npm:
    image: 'node:latest'
    working_dir: /var/www/html
    entrypoint: [ "npm" ]
    volumes:
      - ./src/api:/var/www/html

  npm_nuxt:
    image: 'node:latest'
    working_dir: /nuxt
    entrypoint: [ "npm" ]
    volumes:
      - ./src/nuxt:/nuxt
    stdin_open: true
    tty: true

  nuxt:
    build:
      context: .
      dockerfile: dockerfiles/nuxt.dockerfile
    ports:
      - '80:3000'
      - '24678:24678'
    volumes:
      - ./src/nuxt:/nuxt
      - /nuxt/node_modules
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true